<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hỗ trợ</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <main class="chat-shell">
    <header><div><h1>Hỗ trợ</h1><span id="status">Đang kết nối…</span></div><div class="header-actions"><select id="channel" aria-label="Kênh chat"><option value="boss">Nhắn boss</option><option value="global">Kênh chung</option></select><button id="close-chat" type="button" title="Đóng (Esc)" aria-label="Đóng cửa sổ chat">×</button></div></header>
    <section id="messages" aria-live="polite"></section>
    <form id="composer"><input id="message" maxlength="2000" autocomplete="off" placeholder="Nhập tin nhắn…"><button type="submit">Gửi</button></form>
  </main>
  <script src="chat.js"></script>
</body>
</html>
