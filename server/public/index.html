<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustDesk Control Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2"/>
                        <path d="M8 21H16M12 17V21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <h1>Device Management</h1>
                </div>
                <div class="status-badge">
                    <span class="dot pulse"></span>
                    <span id="device-count">0 Online</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section id="alert-panel" class="alert-panel" hidden>
                <div class="alert-panel-heading">
                    <div><strong>Cảnh báo từ chat</strong><span id="alert-count"></span></div>
                    <span>Thiết bị gửi từ khóa cần chú ý</span>
                </div>
                <div id="alert-list"></div>
            </section>
            
            <section class="settings-panel">
                <div class="settings-header" onclick="document.getElementById('settings-content').hidden = !document.getElementById('settings-content').hidden">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
                            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
                        </svg>
                        <strong>Cấu hình Từ Khóa Cảnh Báo</strong>
                    </div>
                    <span style="font-size: 0.8rem; color: var(--text-secondary);">Nhấp để mở rộng/thu gọn</span>
                </div>
                <div id="settings-content" class="settings-content" hidden>
                    <p style="margin-bottom: 0.75rem; color: var(--text-secondary);">Nhập các từ khóa cảnh báo, cách nhau bằng dấu phẩy (VD: khẩn cấp, cứu):</p>
                    <textarea id="keywords-input" rows="2" placeholder="Đang tải..."></textarea>
                    <div style="display: flex; align-items: center; gap: 1rem; margin-top: 1rem;">
                        <button id="save-keywords-btn" class="btn-connect">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                                <polyline points="17 21 17 13 7 13 7 21"/>
                                <polyline points="7 3 7 8 15 8"/>
                            </svg>
                            Lưu cấu hình
                        </button>
                        <span id="settings-message"></span>
                    </div>
                </div>
            </section>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Tìm kiếm theo Hostname hoặc ID...">
                <button id="refresh-btn" class="btn-icon" title="Làm mới">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8M21 3v5h-5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>

            <div class="table-container">
                <table class="devices-table">
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Hostname</th>
                            <th>RustDesk ID</th>
                            <th>Mật khẩu</th>
                            <th>Last Seen</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="device-list">
                        <!-- Items will be injected here by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Đã sao chép vào bộ nhớ tạm!</div>

    <script src="app.js"></script>
</body>
</html>
